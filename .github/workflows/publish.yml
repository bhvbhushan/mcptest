name: Publish to npm

on:
  push:
    branches: [main]
    paths: [package.json]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (OIDC requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Check if version is already published
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          PUBLISHED_VERSION=$(npm view mcp-quality-gate version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $CURRENT_VERSION is already published. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $CURRENT_VERSION (published: $PUBLISHED_VERSION)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.skip == 'false'
        run: npm ci

      - name: Lint
        if: steps.version-check.outputs.skip == 'false'
        run: npm run lint

      - name: Test
        if: steps.version-check.outputs.skip == 'false'
        run: npm test

      - name: Build
        if: steps.version-check.outputs.skip == 'false'
        run: npm run build

      - name: Publish to npm (Trusted Publisher via OIDC)
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.version-check.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.version-check.outputs.current }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
